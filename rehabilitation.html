<!DOCTYPE html>
<html>

<head>
    <title>Rehabilitation</title>

    <style>
        body {
            margin: 0;
            font-family: Poppins;
            background: #f4f7fa;
        }

        .hero {
            height: 60vh;
            background: url('images/image2.jpg') center/cover;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 40px;
            font-weight: bold;
        }

        .section {
            padding: 50px;
            text-align: center;
        }

        .cards {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
        }

        .card {
            background: white;
            margin: 15px;
            padding: 25px;
            width: 280px;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
        }

        .btn {
            background: #27ae60;
            color: white;
            padding: 12px 25px;
            border-radius: 30px;
            text-decoration: none;
        }
    </style>

</head>

<body>

    <div class="hero">Rehabilitation Program</div>

    <div class="section">
        <h2>Our Mission</h2>
        <p>
            Helping patients rebuild life with dignity.
            <br><br>
            ہم مریضوں کو نئی زندگی شروع کرنے میں مدد دیتے ہیں۔
        </p>
    </div>

    <div class="section">
        <h2>Services</h2>
        <div class="cards">
            <div class="card">Daily Routine</div>
            <div class="card">Skill Development</div>
            <div class="card">Physical Health</div>
        </div>
    </div>

    <div class="section">
        <h2>Our Facility</h2>
        <img src="images/image2.jpg" width="300">
    </div>

    <div class="section">
        <h2>Donate</h2>
        <a class="btn" href="https://wa.me/923003892475">Support Now</a>
    </div>

    <div class="section">
        <a class="btn" href="index.html">Back</a>
    </div>

</body>

</html>
